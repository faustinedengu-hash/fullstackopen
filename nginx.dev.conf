events { }

http {
  server {
    listen 80;

    # Route requests starting with /api to the backend container
    location /api/ {
      proxy_pass http://bloglist-backend:3003;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    # Route all other requests (including WebSockets for Vite HMR) to the frontend container
    location / {
      proxy_pass http://bloglist-frontend:5173;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }
  }
}