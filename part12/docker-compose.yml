version: '3.8'

services:
  # ---- BACKEND SERVICE ----
  backend:
    build:
      context: ./material-applications/example-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - REQUEST_ORIGIN=http://localhost:5000

  # ---- FRONTEND SERVICE ----
  frontend:
    build:
      context: ./material-applications/example-frontend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8080