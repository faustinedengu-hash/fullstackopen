name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize]

jobs:
  simple_deployment_pipeline:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    defaults:
      run:
        working-directory: ./part11

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '0'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Check style
        run: npm run eslint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # 2026 STANDARD CONDITIONAL: Only execute deployment on direct push/merge events to main
      - name: Deploy to Render
        if: ${{ github.event_name == 'push' }}
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      # 2026 STANDARD CONDITIONAL: Only bump version tags on direct push/merge events to main
      - name: Bump version and push tag
        if: ${{ github.event_name == 'push' }}
        uses: anothrNick/github-tag-action@1.71.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch