name: Deployment pipeline

on:
  push:
    branches:
      - main

jobs:
  simple_deployment_pipeline:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./part11

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm install
        
      - name: Check style
        run: npm run eslint

      # NEW STEP FOR EXERCISE 11.3
      - name: Test
        run: npm run test

      - name: Build
        run: npm run build