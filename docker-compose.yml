services:
  app-db:
    image: mongo:7.0
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=secret
    volumes:
      - mongo_data:/data/db

  bloglist-backend:
    build:
      context: ./part4
      dockerfile: Dockerfile
    environment:
      - MONGODB_URI=mongodb://root:secret@app-db:27017/bloglistdev?authSource=admin
      - PORT=3003
      - SECRET=your_production_jwt_secret_key_here
    depends_on:
      - app-db

  bloglist-frontend:
    build:
      context: ./part5
      dockerfile: Dockerfile
    depends_on:
      - bloglist-backend

  nginx-proxy:
    image: nginx:1.25-alpine
    ports:
      - 8080:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - bloglist-frontend
      - bloglist-backend

volumes:
  mongo_data: