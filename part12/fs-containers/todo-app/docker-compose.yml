services:
  # THE FRONTEND LAYER (PRODUCTION)
  frontend:
    image: todo-frontend-prod
    build: ./todo-frontend
    container_name: todo-frontend-prod-container
    # NO PORTS EXPOSED! Safely hidden behind Nginx.

  # THE BACKEND LAYER (PRODUCTION)
  app:
    image: todo-backend-prod
    build: ./todo-backend
    container_name: todo-backend-prod-container
    environment:
      - MONGO_URL=mongodb://mongo:27017/todo-app
      - REDIS_URL=redis://redis:6379
    # NO PORTS EXPOSED! Safely hidden behind Nginx.

  # THE DATABASES (PRODUCTION STORAGE)
  mongo:
    image: mongo
    container_name: todo-db-prod-container
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis
    container_name: todo-redis-prod-container
    volumes:
      - redis_data:/data

  # THE NGINX REVERSE PROXY (THE ONLY PUBLIC DOOR)
  nginx:
    image: nginx:1.25-alpine
    container_name: todo-nginx-prod-container
    ports:
      # This is the ONLY port open to the outside world!
      - 8080:80
    volumes:
      # We mount the production config we just created
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - app

volumes:
  mongo_data:
  redis_data: